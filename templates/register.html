{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2><i class="fas fa-user-plus"></i> Регистрация</h2>
    <form action="/register" method="POST">
        <input type="text" name="full_name" placeholder="Полное имя" required>
        <input type="text" name="username" placeholder="Придумайте логин" required>
        <input type="password" name="password" placeholder="Придумайте пароль" required>
        <button type="submit" class="btn btn-primary">Создать аккаунт</button>
    </form>

    <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px;">
        <p style="font-size: 0.9rem; color: #555;">
            Уже есть аккаунт?
            <a href="/login" style="color: var(--primary); font-weight: 600; text-decoration: none;">Войти</a>
        </p>
    </div>
</div>
{% endblock %}
