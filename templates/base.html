<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniBank System</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <a href="/" style="font-size: 1.5rem; font-weight: bold; color: white; text-decoration: none;">
                <i class="fas fa-university"></i> MiniBank
            </a>
        </div>
        <div class="nav-links">
            {% if session.get('user') %}
                <a href="/dashboard">Личный кабинет</a>
                <a href="/logout"><i class="fas fa-sign-out-alt"></i> Выйти</a>
            {% else %}
                <a href="/login">Вход</a>
                <a href="/register">Регистрация</a>
            {% endif %}
        </div>
    </nav>

    <div class="main-wrapper">
        {% block content %}
        {% endblock %}
    </div>

    <footer style="text-align: center; padding: 20px; color: #777; font-size: 0.9rem;">
        &copy; 2026 MiniBank System. Разработано для учебного проекта.
    </footer>

</body>
</html>
